name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        working-directory: api
        run: dotnet restore Geogrid.slnx
      - name: Build
        working-directory: api
        run: dotnet build Geogrid.slnx --configuration Release --no-restore
      - name: Test
        working-directory: api
        run: dotnet test Geogrid.slnx --configuration Release --no-build --verbosity normal

  web:
    name: Web (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Lint
        working-directory: web
        run: npm run lint
      - name: Build
        working-directory: web
        run: npm run build
